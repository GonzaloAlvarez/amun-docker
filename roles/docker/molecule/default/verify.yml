---
- name: Verify
  hosts: all
  tasks:
    - name: Run hello-world container
      ansible.builtin.command: docker run hello-world
      register: hello_world
      changed_when: false

    - name: Verify hello-world output
      assert:
        that:
          - hello_world.rc == 0
          - "'Hello from Docker!' in hello_world.stdout"

    # ── resiliency: install correctness ──────────────────────────────────
    - name: Stat installed artifacts
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /etc/systemd/system/docker-compose@cn-mock-simple.service
        - /etc/systemd/system/docker-compose@cn-mock-nfs.service
        - /etc/cron.d/cn-mock-simple-reconcile
        - /etc/cron.d/cn-mock-nfs-reconcile
        - /usr/local/lib/amun/reconcile-stack.sh
        - /var/lib/node_exporter/textfile_collector
      register: art

    - name: All artifacts present
      ansible.builtin.assert:
        that: "item.stat.exists"
        fail_msg: "missing: {{ item.item }}"
      loop: "{{ art.results }}"
      loop_control: { label: "{{ item.item }}" }

    - name: Boot unit is enabled
      ansible.builtin.command: systemctl is-enabled docker-compose@cn-mock-simple.service
      register: en
      changed_when: false
    - ansible.builtin.assert:
        that: "'enabled' in en.stdout"

    - name: NFS unit rendered the mount gating + force-recreate + ordering + BindsTo + require_paths
      ansible.builtin.slurp:
        src: /etc/systemd/system/docker-compose@cn-mock-nfs.service
      register: nfsunit
    - ansible.builtin.assert:
        that:
          - "'RequiresMountsFor=/mnt/mock-nfs' in (nfsunit.content | b64decode)"
          - "'--force-recreate' in (nfsunit.content | b64decode)"
          - "'docker-compose@cn-mock-simple.service' in (nfsunit.content | b64decode)"
          - "'stat -f -c' in (nfsunit.content | b64decode)"
          # BindsTo must use the systemd-escaped .mount name (dash -> \x2d),
          # matching `systemd-escape -p --suffix=mount /mnt/mock-nfs` =
          # mnt-mock\x2dnfs.mount. The two brackets can only be adjacent across
          # the escaped separator backslash (asserting the literal backslash
          # directly is unreliable — Ansible's conditional templating collapses
          # \x2d).
          - "'BindsTo=mnt-mock' in (nfsunit.content | b64decode)"
          - "'x2dnfs.mount' in (nfsunit.content | b64decode)"
          # require_paths -> ExecStartPre test -d
          - "'test -d /mnt/mock-nfs/data' in (nfsunit.content | b64decode)"
          # working_dir override -> WorkingDirectory + PWD point elsewhere than the discovered dir
          - "'WorkingDirectory=/opt/mock-nfs' in (nfsunit.content | b64decode)"
          - "'PWD=/opt/mock-nfs' in (nfsunit.content | b64decode)"

    - name: Reconcile cron calls the shared helper
      ansible.builtin.slurp:
        src: /etc/cron.d/cn-mock-simple-reconcile
      register: cronf
    - ansible.builtin.assert:
        that: "'/usr/local/lib/amun/reconcile-stack.sh cn-mock-simple' in (cronf.content | b64decode)"

    - name: Reconcile cron passes project + working_dir + unit-name (3-arg form)
      ansible.builtin.slurp:
        src: /etc/cron.d/cn-mock-nfs-reconcile
      register: cronnfs
    - ansible.builtin.assert:
        that: "'reconcile-stack.sh cn-mock-nfs /opt/mock-nfs cn-mock-nfs' in (cronnfs.content | b64decode)"

    # Regression: with working_dir != stack name, the boot-unit health metric
    # must resolve docker-compose@<stack> (from arg3), NOT @<basename working_dir>.
    - name: Run reconcile for the working_dir-override stack
      ansible.builtin.command: /usr/local/lib/amun/reconcile-stack.sh cn-mock-nfs /opt/mock-nfs cn-mock-nfs
      environment:
        RESILIENCE_TEXTFILE_DIR: /var/lib/node_exporter/textfile_collector
      changed_when: true
    - name: Its metric reports the real (enabled) unit=1, not @mock-nfs=0
      ansible.builtin.command:
        cmd: grep -Eq 'resilience_boot_unit_enabled\{stack="cn-mock-nfs"[^}]*\} 1' /var/lib/node_exporter/textfile_collector/resilience_cn-mock-nfs.prom
      changed_when: false
      # non-zero exit (no match) fails the task → proves arg3 resolved
      # docker-compose@cn-mock-nfs (enabled), not @mock-nfs (basename working_dir)

    # ── resiliency: FUNCTIONAL — the exited-container repair path ─────────
    - name: Bring the mock stack up
      ansible.builtin.command: docker compose -p cn-mock-simple up -d
      args: { chdir: "{{ ansible_env.HOME }}/cn-mock-simple" }
      changed_when: true

    - name: Stop the container (simulate the ungraceful-reboot exited class)
      ansible.builtin.command: docker stop cn-mock-simple-sleeper-1
      changed_when: true

    - name: Run the reconcile helper
      ansible.builtin.command: /usr/local/lib/amun/reconcile-stack.sh cn-mock-simple {{ ansible_env.HOME }}/cn-mock-simple
      environment:
        RESILIENCE_TEXTFILE_DIR: /var/lib/node_exporter/textfile_collector
      register: recon
      changed_when: true

    - name: Sleeper is running again (exited container was repaired)
      ansible.builtin.command: docker inspect -f '{{ "{{" }}.State.Status{{ "}}" }}' cn-mock-simple-sleeper-1
      register: sleeper_state
      changed_when: false
    - ansible.builtin.assert:
        that: "'running' in sleeper_state.stdout"
        fail_msg: "reconcile did not restart the exited container"

    - name: Textfile metric written with a repair recorded
      ansible.builtin.slurp:
        src: /var/lib/node_exporter/textfile_collector/resilience_cn-mock-simple.prom
      register: prom
    - ansible.builtin.assert:
        that:
          - "'resilience_reconcile_success{stack=\"cn-mock-simple\"' in (prom.content | b64decode)"
          - "'resilience_reconcile_repairs_total' in (prom.content | b64decode)"

    # ── resiliency: FUNCTIONAL — the network-detachment repair path ──────
    # Reproduce the 2026-07-03 reboot glitch: a container left RUNNING but with
    # its network endpoint gone (loki/promtail came up before their net existed).
    - name: Detach the running mock container from its network
      ansible.builtin.command: docker network disconnect cn-mock-simple_default cn-mock-simple-sleeper-1
      changed_when: true

    - name: Precondition — it is now network-detached (0 networks) but still running
      ansible.builtin.command: docker inspect -f '{{ "{{" }}len .NetworkSettings.Networks{{ "}}" }} {{ "{{" }}.State.Status{{ "}}" }}' cn-mock-simple-sleeper-1
      register: nets_before
      changed_when: false
    - ansible.builtin.assert:
        that:
          - "nets_before.stdout.split()[0] == '0'"
          - "'running' in nets_before.stdout"
        fail_msg: "precondition failed: {{ nets_before.stdout }}"

    - name: Run the reconcile helper (must detect net-detached + force-recreate)
      ansible.builtin.command: /usr/local/lib/amun/reconcile-stack.sh cn-mock-simple {{ ansible_env.HOME }}/cn-mock-simple
      environment:
        RESILIENCE_TEXTFILE_DIR: /var/lib/node_exporter/textfile_collector
      changed_when: true

    - name: Container is reattached to a network + running again
      ansible.builtin.command: docker inspect -f '{{ "{{" }}len .NetworkSettings.Networks{{ "}}" }} {{ "{{" }}.State.Status{{ "}}" }}' cn-mock-simple-sleeper-1
      register: nets_after
      changed_when: false
    - ansible.builtin.assert:
        that:
          - "nets_after.stdout.split()[0] | int >= 1"
          - "'running' in nets_after.stdout"
        fail_msg: "reconcile did not reattach the network-detached container ({{ nets_after.stdout }})"

    # ── resiliency: FUNCTIONAL — the created-never-started repair path ───
    # Reproduce the 2026-07-24 passwords.lan outage: a boot-unit `up -d` that
    # aborts between its create and start phases (removal race with this very
    # cron) leaves containers in CREATED. Docker's restart policy ignores
    # containers that never ran, so the reconciler must start them.
    - name: Reset the mock stack to CREATED (compose create, never started)
      ansible.builtin.shell: |
        docker compose -p cn-mock-simple down
        docker compose -p cn-mock-simple create
      args: { chdir: "{{ ansible_env.HOME }}/cn-mock-simple" }
      changed_when: true

    - name: Precondition — container is in created state
      ansible.builtin.command: docker inspect -f '{{ "{{" }}.State.Status{{ "}}" }}' cn-mock-simple-sleeper-1
      register: created_pre
      changed_when: false
    - ansible.builtin.assert:
        that: "'created' in created_pre.stdout"
        fail_msg: "precondition failed: {{ created_pre.stdout }}"

    - name: Run the reconcile helper (must start the created container)
      ansible.builtin.command: /usr/local/lib/amun/reconcile-stack.sh cn-mock-simple {{ ansible_env.HOME }}/cn-mock-simple
      environment:
        RESILIENCE_TEXTFILE_DIR: /var/lib/node_exporter/textfile_collector
      changed_when: true

    - name: Sleeper is running (created container was started)
      ansible.builtin.command: docker inspect -f '{{ "{{" }}.State.Status{{ "}}" }}' cn-mock-simple-sleeper-1
      register: created_post
      changed_when: false
    - ansible.builtin.assert:
        that: "'running' in created_post.stdout"
        fail_msg: "reconcile did not start the created container ({{ created_post.stdout }})"

    # ── resiliency: FUNCTIONAL — the stale-netns (restarted sidecar) repair ──
    # A network_mode:container dependent whose sidecar RESTARTED into a new netns
    # is stranded in the old dead netns (the cn-fitness case). The target is
    # ALIVE, so a dead-target check can't see it — the netns-inode compare must.
    - name: Bring up the sidecar-netns mock stack
      ansible.builtin.command: docker compose -p cn-mock-netns up -d
      args: { chdir: "{{ ansible_env.HOME }}/cn-mock-netns" }
      changed_when: true

    - name: Restart the netns owner (new netns for it; dependent goes stale)
      ansible.builtin.command: docker restart cn-mock-netns-owner-1
      changed_when: true

    - name: Precondition — dependent netns != owner netns (stranded), owner alive
      ansible.builtin.shell: |
        op=$(docker inspect cn-mock-netns-owner-1 -f '{{ "{{" }}.State.Pid{{ "}}" }}')
        dp=$(docker inspect cn-mock-netns-dependent-1 -f '{{ "{{" }}.State.Pid{{ "}}" }}')
        o=$(readlink /proc/$op/ns/net); d=$(readlink /proc/$dp/ns/net)
        echo "owner=$o dep=$d"
        [ -n "$o" ] && [ -n "$d" ] && [ "$o" != "$d" ]
      register: stale_pre
      changed_when: false

    - name: Run the reconcile helper (must detect netns-stale + force-recreate)
      ansible.builtin.command: /usr/local/lib/amun/reconcile-stack.sh cn-mock-netns {{ ansible_env.HOME }}/cn-mock-netns
      environment:
        RESILIENCE_TEXTFILE_DIR: /var/lib/node_exporter/textfile_collector
      changed_when: true

    - name: Dependent rejoined the owner's CURRENT netns + still running
      ansible.builtin.shell: |
        op=$(docker inspect cn-mock-netns-owner-1 -f '{{ "{{" }}.State.Pid{{ "}}" }}')
        dp=$(docker inspect cn-mock-netns-dependent-1 -f '{{ "{{" }}.State.Pid{{ "}}" }}')
        o=$(readlink /proc/$op/ns/net); d=$(readlink /proc/$dp/ns/net)
        st=$(docker inspect cn-mock-netns-dependent-1 -f '{{ "{{" }}.State.Status{{ "}}" }}')
        echo "owner=$o dep=$d status=$st"
        [ "$o" = "$d" ] && [ "$st" = running ]
      register: stale_post
      changed_when: false
